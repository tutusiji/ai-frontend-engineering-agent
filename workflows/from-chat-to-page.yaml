id: from-chat-to-page
name: From Chat To Frontend Page
version: 0.3.0

input:
  schema: requirement-chat-input
  fields:
    - name: userPrompt
      type: string
      required: true
    - name: attachments
      type: array
      required: false
    - name: targetProject
      type: string
      required: true

nodes:
  - id: requirement_analysis
    type: agent
    name: 需求分析
    skill: requirement-analysis
    outputSchema: requirement-spec

  - id: target_profile_selection
    type: agent
    name: 目标 Profile 选择
    skill: target-profile-selection
    dependsOn:
      - requirement_analysis
    outputSchema: target-profile-selection

  - id: page_planning
    type: agent
    name: 页面规划
    skill: page-planning
    dependsOn:
      - target_profile_selection
    outputSchema: page-plan

  - id: navigation_decision
    type: plugin
    name: 导航决策
    plugin: navigation-decider
    dependsOn:
      - page_planning
    outputSchema: ui-contract

  - id: implementation_plan
    type: agent
    name: 实现计划
    skill: frontend-coding-core
    dependsOn:
      - navigation_decision
    outputSchema: implementation-plan

  - id: code_generation
    type: plugin
    name: 代码生成
    plugin: page-generator
    dependsOn:
      - implementation_plan
    outputSchema: generation-report

  - id: rule_check
    type: pluginGroup
    name: 规则检查
    plugins:
      - loading-rule-checker
      - debounce-rule-checker
      - delete-confirm-rule-checker
      - pagination-table-rule-checker
    dependsOn:
      - code_generation
    outputSchema: validation-report

  - id: e2e_validation
    type: plugin
    name: E2E 验证
    plugin: playwright-runner
    dependsOn:
      - rule_check
    when:
      allPassed: true
    outputSchema: validation-report

  - id: visual_validation
    type: plugin
    name: 视觉回归验证
    plugin: visual-regression-runner
    dependsOn:
      - e2e_validation
    outputSchema: validation-report
    # 当视觉验证失败时，回退到代码生成重新修复
    retryTarget: code_generation
    maxRetries: 3
    requiresApproval: false

  - id: fix_loop
    type: agent
    name: 修复回流
    skill: frontend-coding-core
    dependsOn:
      - visual_validation
    when:
      hasFailures: true
    outputSchema: generation-report

output:
  primaryFrom: visual_validation
