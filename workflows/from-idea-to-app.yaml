id: from-idea-to-app
name: From Idea To Application
version: 0.2.0
description: 新项目专用工作流 — 从想法到完整应用，支持交互式需求对话

input:
  schema: idea-input
  fields:
    - name: userMessage
      type: string
      required: true
    - name: conversationHistory
      type: array
      required: false
    - name: existingDocument
      type: object
      required: false
    - name: mode
      type: string
      required: false
      enum: [gather, refine, score, design, code]

nodes:
  - id: interactive_requirement
    type: agent
    name: 交互式需求收集
    skill: interactive-requirement
    outputSchema: requirement-spec

  - id: target_profile_selection
    type: agent
    name: 目标 Profile 选择
    skill: target-profile-selection
    dependsOn:
      - interactive_requirement
    outputSchema: target-profile-selection

  - id: design_generation
    type: agent
    name: 设计稿生成
    skill: design-generation
    dependsOn:
      - target_profile_selection
    when:
      allPassed: true
    outputSchema: generation-report

  - id: code_generation
    type: agent
    name: 代码生成
    skill: code-generation
    dependsOn:
      - design_generation
    when:
      allPassed: true
    outputSchema: generation-report
    # 代码生成失败时可以回退到设计稿重新生成
    retryTarget: design_generation
    maxRetries: 2

output:
  primaryFrom: code_generation
