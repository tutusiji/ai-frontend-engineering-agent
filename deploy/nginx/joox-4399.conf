# AI Frontend Engineering Agent
# 外网访问入口： https://joox.cc:4399
# 证书策略：复用 joox.cc 现有 SSL 证书
# 说明：
# - Studio Web 默认转发到 127.0.0.1:4400
# - Orchestrator API 默认转发到 127.0.0.1:4401
# - Worker Runtime 作为内网服务运行，不直接暴露公网
# - 如前端需要直接访问 API，统一走 /api/ 前缀

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream ai_fea_studio_web {
    server 127.0.0.1:4400;
    keepalive 32;
}

upstream ai_fea_orchestrator_api {
    server 127.0.0.1:4401;
    keepalive 32;
}

server {
    listen              4399 ssl http2;
    listen              [::]:4399 ssl http2;
    server_name         joox.cc;

    ssl_certificate     /etc/nginx/ssl/joox.cc.pem;
    ssl_certificate_key /etc/nginx/ssl/joox.cc.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/ {
        proxy_pass http://ai_fea_orchestrator_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /events/ {
        proxy_pass http://ai_fea_orchestrator_api/events/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /ws/ {
        proxy_pass http://ai_fea_orchestrator_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://ai_fea_studio_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
